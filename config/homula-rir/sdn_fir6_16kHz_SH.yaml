save_dir: 'saved_models/sdn_fir6_16kHz_SH'
fig_dir: 'figures/sdn_fir6_16kHz_SH'

sr: 16000
c: 343.0

source_index: 0

training:
  split_mode: second_half
  batch_size: 4          # SDN input dimension for each forward pass
  accumulation_factor: 8 # effective batch size = batch_size * accumulation_factor
  n_epochs: 300
  learning_rate: 0.01
  lambda_edc: 0.5
  lambda_edp: 1.0
  lambda_edr: 1.0

sdn:
  N: 6
  junction_type: 'householder'
  fir_order: 6
  alpha: 0.02